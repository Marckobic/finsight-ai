[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-fail-under=95",
]

[tool.coverage.run]
source = [
    "packages/core-engine/core_engine",
    "packages/scenario-engine/scenario_engine",
    "packages/validation-gateway/validation_gateway",
    "packages/shared-types/shared_types",
    "packages/ai-layer/ai_layer",
]
omit = [
    "tests/*",
    "apps/*",
    "infra/*",
    "verify_engine.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
